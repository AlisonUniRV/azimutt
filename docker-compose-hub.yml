services:
  database:
    image: postgres:latest
    restart: always
    container_name: azimutt-db
    volumes:
      - /opt/data/Azimutt/postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: azimutt_dev

backend:
    container_name: azimutt-backend
    platform: linux/amd64
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - database
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "ecto://postgres:postgres@database/azimutt_dev"
      SECRET_KEY_BASE: "1wOVZ9rWAqPcbVZdilZzBPLXFKNrUmLUzX0q9Z02LpOy2jVWZwa6ee4fU81tuN+W"
      PHX_HOST: "localhost"
      PORT: "4000"
      
      # 👇 ADICIONE AS VARIÁVEIS ABAIXO:
      FILE_STORAGE_ADAPTER: "Local"  # Resolve o erro atual
      
      # Variáveis extras que o Azimutt costuma exigir para o Login/Ambiente:
      SKIP_EMAIL_CONFIRMATION: "true"
      ORGANIZATION_DEFAULT_PLAN: "free"
