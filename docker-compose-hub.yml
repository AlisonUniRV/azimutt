services:
  database:
    image: postgres:latest
    restart: always
    container_name: azimutt-db
    volumes:
      - /opt/data/Azimutt/postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: azimutt_dev

  backend:
    container_name: azimutt-backend
    platform: linux/amd64
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - database
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "ecto://postgres:postgres@database/azimutt_dev"
      SECRET_KEY_BASE: "1wOVZ9rWAqPcbVZdilZzBPLXFKNrUmLUzX0q9Z02LpOy2jVWZwa6ee4fU81tuN+W"
      # 👇 AS DUAS VARIÁVEIS EXIGIDAS PELO PHOENIX ADICIONADAS AQUI:
      PHX_HOST: "localhost" # Altere para o IP do seu servidor se for acessar externamente
      PORT: "4000"
