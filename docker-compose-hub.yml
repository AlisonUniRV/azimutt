version: '3.8'

services:
  database:
    image: postgres:16
    restart: always
    container_name: azimutt-db
    volumes:
      - /opt/data/Azimutt/postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: azimutt_dev
    networks:
      - azimutt-net

  backend:
    container_name: azimutt-backend
    platform: linux/amd64
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - database
    # 🚨 NOTA: A porta foi removida daqui e passada para o proxy abaixo!
    environment:
      DATABASE_URL: "ecto://postgres:postgres@azimutt-db/azimutt_dev"
      SECRET_KEY_BASE: "1wOVZ9rWAqPcbVZdilZzBPLXFKNrUmLUzX0q9Z02LpOy2jVWZwa6ee4fU81tuN+W"
      FILE_STORAGE_ADAPTER: "local"
      SKIP_EMAIL_CONFIRMATION: "true"
      ORGANIZATION_DEFAULT_PLAN: "free"
      AUTH_PASSWORD: "true"
      PHX_HOST: "192.168.154.34"
      PORT: "4000"
    networks:
      - azimutt-net

  # NOVO: Proxy super leve para reescrever o cabeçalho e corrigir o erro 403
  proxy:
    image: caddy:alpine
    container_name: azimutt-proxy
    restart: always
    ports:
      - "4000:80" # Recebe o seu tráfego na 4000 e joga para o Caddy interno
    depends_on:
      - backend
    command: >
      sh -c "echo ':80 { 
        reverse_proxy azimutt-backend:4000 { 
          header_up Origin https://192.168.154.34 
        } 
      }' > /etc/caddy/Caddyfile && caddy run --config /etc/caddy/Caddyfile"
    networks:
      - azimutt-net

networks:
  azimutt-net:
    driver: bridge
