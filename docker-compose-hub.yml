version: '3.8'

services:
  database:
    image: postgres:16
    restart: always
    container_name: azimutt-db
    volumes:
      - /opt/data/Azimutt/postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: azimutt_dev
    networks:
      - azimutt-net

  backend:
    container_name: azimutt-backend
    platform: linux/amd64
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - database
    environment:
      DATABASE_URL: "ecto://postgres:postgres@azimutt-db/azimutt_dev"
      SECRET_KEY_BASE: "1wOVZ9rWAqPcbVZdilZzBPLXFKNrUmLUzX0q9Z02LpOy2jVWZwa6ee4fU81tuN+W"
      FILE_STORAGE_ADAPTER: "local"
      SKIP_EMAIL_CONFIRMATION: "true"
      ORGANIZATION_DEFAULT_PLAN: "free"
      AUTH_PASSWORD: "true"
      PHX_HOST: "192.168.154.34"
      PORT: "4000"
    networks:
      - azimutt-net

  proxy:
    image: caddy:alpine
    container_name: azimutt-proxy
    restart: always
    ports:
      - "80:80"     # Recebe HTTP comum
      - "443:443"   # Recebe HTTPS seguro
    depends_on:
      - backend
    # O bloco do Caddy ficou mais simples e inteligente:
    command: |
      sh -c "echo '192.168.154.34 {
        tls internal
        reverse_proxy azimutt-backend:4000
      }' > /etc/caddy/Caddyfile && caddy run --config /etc/caddy/Caddyfile"
    networks:
      - azimutt-net

networks:
  azimutt-net:
    driver: bridge
