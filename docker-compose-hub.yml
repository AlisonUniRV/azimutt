version: '3.8'

services:
  database:
    image: postgres:latest
    restart: always
    container_name: azimutt-db
    volumes:
      - /opt/data/Azimutt/postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: azimutt_dev
    networks:
      - azimutt-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d azimutt_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: azimutt-backend
    platform: linux/amd64
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "ecto://postgres:postgres@database/azimutt_dev"
      SECRET_KEY_BASE: "1wOVZ9rWAqPcbVZdilZzBPLXFKNrUmLUzX0q9Z02LpOy2jVWZwa6ee4fU81tuN+W"
      PHX_HOST: "localhost"
      PORT: "4000"
      FILE_STORAGE_ADAPTER: "local"
      SKIP_EMAIL_CONFIRMATION: "true"
      ORGANIZATION_DEFAULT_PLAN: "free"
    networks:
      - azimutt-net

networks:
  azimutt-net:
    driver: bridge
